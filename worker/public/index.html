<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTG archetype — unusual card scan</title>
<style>
:root {
  --bg:#0f1216; --card:#171c22; --line:#252c34; --ink:#e6e9ee; --dim:#8b95a1;
  --hot:#ffb454; --side:#6cc4ff; --count:#c9a3ff; --accent:#ff6b6b;
  --misssb:#58b3a6;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink);
  font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
a { color:inherit; }
header { padding:18px 24px; border-bottom:1px solid var(--line); }
header h1 { margin:0 0 4px; font-size:18px; }
header .sub { color:var(--dim); font-size:12px; }
header .sub a { color:var(--side); }
.stockbar { padding:10px 24px; border-bottom:1px solid var(--line);
  color:var(--dim); font-size:12px; display:flex; flex-wrap:wrap; gap:6px;
  align-items:center; }
.stockbar .stk { background:#1c2229; border:1px solid var(--line);
  border-radius:4px; padding:1px 6px; color:var(--ink); }
.stockbar code { background:#1c2229; padding:1px 5px; border-radius:4px; }
.controls { padding:10px 24px; border-bottom:1px solid var(--line);
  display:flex; gap:14px; align-items:center; flex-wrap:wrap; font-size:12px;
  color:var(--dim); }
.controls label { display:flex; gap:5px; align-items:center; cursor:pointer; }
.controls select, .controls button { background:#1c2229; color:var(--ink);
  border:1px solid var(--line); border-radius:6px; padding:4px 10px; cursor:pointer;
  font:inherit; }
.controls select:hover, .controls button:hover { border-color:#3a4552; }
.controls button:disabled { opacity:.5; cursor:default; }
.layout { display:flex; align-items:flex-start; }
ul.decks { list-style:none; margin:0; padding:14px 24px; flex:1; min-width:0; }
li.deck { background:var(--card); border:1px solid var(--line); border-radius:8px;
  padding:10px 12px; margin-bottom:8px; cursor:default; transition:border-color .1s; }
li.deck:hover { border-color:#3a4552; }
li.deck.active { border-color:var(--accent); }
.row { display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; }
.place { font-weight:700; min-width:44px; color:var(--dim); }
.player { font-weight:600; min-width:150px; }
.player a { text-decoration:none; }
.player a:hover { text-decoration:underline; }
.tourney { color:var(--dim); flex:1; min-width:150px; }
.date { color:var(--dim); font-variant-numeric:tabular-nums; }
.badge { margin-left:auto; background:var(--accent); color:#fff; font-weight:700;
  border-radius:20px; min-width:22px; text-align:center; padding:1px 7px; font-size:12px; }
.badge.zero { background:#2b333c; color:var(--dim); }
.chips { margin-top:7px; display:flex; flex-wrap:wrap; gap:5px; }
.chip { font-size:12px; border-radius:5px; padding:2px 7px; border:1px solid; }
.chip em { font-style:normal; opacity:.7; }
.chip.main { color:var(--hot); border-color:#5a4626; background:#241d10; }
.chip.count { color:var(--count); border-color:#42355c; background:#1e1826; }
.chip.side { color:var(--side); border-color:#2a4a63; background:#111f2a; }
.chip.scount { color:var(--misssb); border-color:#274b46; background:#0f201d; }
.chip.none { color:var(--dim); border-color:var(--line); }
.diffcols { margin-top:8px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px 10px; }
.col { display:flex; flex-direction:column; gap:4px; align-items:flex-start; min-width:0; }
.col.divide { border-left:1px solid var(--line); padding-left:11px; }
.col .chip { max-width:100%; white-space:normal; }
.col .empty { color:#39424c; }
@media (max-width:1100px) { .diffcols { grid-template-columns:repeat(3,1fr); } }
@media (max-width:640px) { .diffcols { grid-template-columns:repeat(2,1fr); } }
aside { position:sticky; top:0; width:300px; flex:none; height:100vh;
  border-left:1px solid var(--line); padding:16px; overflow:auto; }
aside .hint { color:var(--dim); font-size:12px; }
aside h2 { font-size:13px; margin:0 0 10px; color:var(--dim);
  text-transform:uppercase; letter-spacing:.05em; }
.secttl { margin:12px 0 4px; font-weight:700; color:var(--side); font-size:12px;
  text-transform:uppercase; letter-spacing:.04em; }
.cardline { display:flex; gap:8px; padding:1px 0; }
.cardline .qty { color:var(--dim); min-width:18px; text-align:right;
  font-variant-numeric:tabular-nums; }
.cardline.hot .cname { color:var(--hot); font-weight:700; }
.cardline.hot .qty { color:var(--hot); }
#status { padding:40px 24px; color:var(--dim); }
[data-card] { cursor:help; }
#cardpop { position:fixed; z-index:1000; display:none; pointer-events:none; }
#cardpop img { width:240px; max-width:44vw; border-radius:4.75% / 3.5%;
  box-shadow:0 10px 34px rgba(0,0,0,.6); display:block; background:#0a0c0f; }
@media (max-width:820px) { aside { display:none; } }
</style></head>
<body>
<header>
  <h1 id="title">Izzet Prowess — unusual card scan</h1>
  <div class="sub"><span id="meta">loading…</span> ·
    hover a deck for the full list · fetchlands bucketed ·
    <span style="color:var(--hot)">md added</span> /
    <span style="color:var(--count)">md removed</span> /
    <span style="color:var(--side)">sb added</span> /
    <span style="color:var(--misssb)">sb removed</span></div>
</header>
<div class="stockbar" id="stockbar"></div>
<div class="controls">
  <label>archetype <select id="archetype"></select></label>
  <label><input type="checkbox" id="hideStock"> hide stock-identical lists</label>
  <label><input type="checkbox" id="ignoreCounts"> hide in-range moves</label>
  <button id="refresh">↻ refresh</button>
  <span id="freshness"></span>
</div>
<div class="layout">
  <ul class="decks" id="decks"></ul>
  <aside id="panel"><h2>Decklist</h2><div id="panelbody">
    <div class="hint">Hover a deck on the left to preview its full list here.</div>
  </div></aside>
</div>
<div id="status" style="display:none"></div>

<script>
// ------- config -------------------------------------------------------------
const WORKER = "/decks"; // same-origin: page + API served by one Worker

// Archetypes offered in the dropdown. Add a stock list under STOCKS[slug] to
// enable comparison; without one, the archetype's recent decks are just listed.
const ARCHETYPES = [
  { slug:"modern-izzet-prowess",  label:"Izzet Prowess" },
  { slug:"modern-boros-energy",   label:"Boros Energy" },
  { slug:"modern-dimir-murktide", label:"Dimir Murktide" },
  { slug:"modern-domain-zoo",     label:"Domain Zoo" },
  { slug:"modern-living-end",     label:"Living End" },
];

// Stock lists keyed by archetype slug. A maindeck count may be a number (4) or
// a range string: "2-3" (flag only outside the range), "0-2" (a flex slot that
// is never "missing"). Sideboard is presence-only.
const STOCKS = {
  "modern-izzet-prowess": {
    main: {
      "Thundering Falls":1, "Slickshot Show-Off":4, "Violent Urge":2,
      "Cori-Steel Cutter":4, "Mishra's Bauble":4, "Lightning Bolt":4,
      "Preordain":4, "Mutagenic Growth":4, "Steam Vents":3, "Monastery Swiftspear":4,
      "Lava Dart":4, "Fiery Islet":2, "Mountain":"2 (2-3)",
      "Expressive Iteration":4, "Dragon's Rage Channeler":4,
      // All fetchlands bucket under the "Fetchland" key. Nominal 10, allowed 8-10:
      "Fetchland":"10 (8-10)",
    },
    side: {
      "Meltdown":2, "Consign to Memory":"4 (3-4)", "Spell Snare":1, "Unholy Heat":"4 (3-4)",
      "Spell Pierce":2, "Assault Strobe":1, "Murktide Regent":1,
    },
  },
  // Add more here. side takes counts/ranges just like main, e.g.:
  // "modern-boros-energy": { main: { "Ocelot Pride":4, ... }, side: { "Wear // Tear":"1-2", ... } },
};

const FETCHLANDS = new Set([
  "Arid Mesa","Scalding Tarn","Wooded Foothills","Bloodstained Mire",
  "Flooded Strand","Polluted Delta","Marsh Flats","Misty Rainforest",
  "Verdant Catacombs","Windswept Heath","Prismatic Vista","Fabled Passage",
]);
const FETCH_BUCKET = "Fetchland";

let ARCHETYPE = ARCHETYPES[0].slug; // current selection

// ------- stock parsing + bucketing ------------------------------------------
// A stock count carries a nominal (its count in the real list) and an allowed
// range. Deltas are measured from the nominal so the columns always balance;
// the range only decides whether a delta counts as "unusual" (badge).
//   4            -> nominal 4, exact
//   "2-3"        -> range 2-3, nominal = low end (2)
//   "10 (8-10)"  -> nominal 10, allowed range 8-10
function parseStock(spec) {
  if (typeof spec === "number") return { nom: spec, min: spec, max: spec };
  const s = String(spec).trim();
  let m = s.match(/^(\d+)\s*\(\s*(\d+)\s*-\s*(\d+)\s*\)$/);   // "nom (min-max)"
  if (m) return { nom: +m[1], min: +m[2], max: +m[3] };
  m = s.match(/^(\d+)\s*-\s*(\d+)$/);                         // "min-max"
  if (m) return { nom: +m[1], min: +m[1], max: +m[2] };
  const n = parseInt(s, 10) || 0;
  return { nom: n, min: n, max: n };
}
const fmtStock = (r) => (r.min === r.max ? `${r.nom}` : `${r.nom} (${r.min}-${r.max})`);

// deck counts (numbers) -> fetchlands summed into one bucket
function bucket(counts) {
  const out = {};
  for (const [name, n] of Object.entries(counts)) {
    const key = FETCHLANDS.has(name) ? FETCH_BUCKET : name;
    out[key] = (out[key] || 0) + n;
  }
  return out;
}
// stock spec (numbers/ranges) -> name: {nom,min,max}, fetchlands summed
function bucketStock(mainSpec) {
  const out = {};
  for (const [name, spec] of Object.entries(mainSpec)) {
    const r = parseStock(spec);
    const key = FETCHLANDS.has(name) ? FETCH_BUCKET : name;
    out[key] = out[key]
      ? { nom: out[key].nom + r.nom, min: out[key].min + r.min, max: out[key].max + r.max }
      : { ...r };
  }
  return out;
}
const currentStock = () => STOCKS[ARCHETYPE] || null;

// ------- diff ---------------------------------------------------------------
function diff(deck, ignoreCounts) {
  const stock = currentStock();
  if (!stock) return null;
  const stockMainB = bucketStock(stock.main);
  const stockSideB = bucketStock(stock.side);
  const main = bucket(deck.main), side = bucket(deck.side);

  const addMain = [], remMain = [], addSide = [], remSide = [];
  // Every card's delta is measured from its nominal, so the added and removed
  // columns balance for a fixed-size deck. Entries: [name, delta, deckCount,
  // range, inRange]. A delta whose count still sits inside the allowed range is
  // shown like any other but does NOT count toward the badge (e.g. fetch 9 vs a
  // 10 (8-10) stock). The "hide in-range moves" toggle drops those chips.
  const compare = (counts, stockB, addArr, remArr) => {
    const names = new Set([...Object.keys(counts), ...Object.keys(stockB)]);
    for (const name of [...names].sort()) {
      const n = counts[name] || 0;
      const r = stockB[name] || { nom: 0, min: 0, max: 0 };
      const delta = n - r.nom;
      if (delta === 0) continue;
      const inRange = n >= r.min && n <= r.max;
      if (inRange && ignoreCounts) continue;
      (delta > 0 ? addArr : remArr).push([name, delta, n, r, inRange]);
    }
  };
  compare(main, stockMainB, addMain, remMain);
  compare(side, stockSideB, addSide, remSide);

  const unusual = new Set(
    [...addMain, ...remMain, ...addSide, ...remSide]
      .filter((x) => !x[4]).map((x) => x[0]));
  return { addMain, remMain, addSide, remSide, unusual };
}
const notable = (a) => a.filter((x) => !x[4]).length;  // in-range moves don't count
const deviationCount = (d) =>
  notable(d.addMain) + notable(d.remMain) + notable(d.addSide) + notable(d.remSide);

// ------- rendering ----------------------------------------------------------
const esc = (s) => String(s).replace(/[&<>"']/g,
  (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
// data-card attr for a Scryfall hover preview (skip the synthetic Fetchland bucket)
const dc = (name) => (name === FETCH_BUCKET ? "" : ` data-card="${esc(name)}"`);

// [name, delta, deckCount, range, inRange] -> a signed chip ("+1 Card" / "-2 Card").
const chip = (cls) => ([name, delta, n, r]) =>
  `<span class="chip ${cls}"${dc(name)} title="deck ${n}, stock ${fmtStock(r)}">${delta > 0 ? "+" : ""}${delta} ${esc(name)}</span>`;

// Columns: maindeck added | removed, divider, then sideboard added | removed.
// Each column sorted by delta magnitude, largest change first.
const byMag = (arr) => arr.slice().sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));
function diffCols(d) {
  const cols = [
    ["", byMag(d.addMain).map(chip("main"))],       // md added
    ["", byMag(d.remMain).map(chip("count"))],      // md removed
    ["divide", byMag(d.addSide).map(chip("side"))], // sb added
    ["", byMag(d.remSide).map(chip("scount"))],     // sb removed
  ];
  return '<div class="diffcols">' + cols.map(([cls, arr]) =>
    `<div class="col ${cls}">` +
    (arr.length ? arr.join("") : '<span class="empty">·</span>') + "</div>"
  ).join("") + "</div>";
}

function panelHtml(deck, unusual) {
  const section = (title, counts) => {
    const rows = Object.keys(counts).sort().map((name) => {
      const hot = unusual.has(name) ? " hot" : "";
      return `<div class="cardline${hot}"><span class="qty">${counts[name]}</span>` +
        `<span class="cname"${dc(name)}>${esc(name)}</span></div>`;
    }).join("");
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    return `<div class="secttl">${title} (${total})</div>${rows}`;
  };
  return section("Maindeck", deck.main) + section("Sideboard", deck.side);
}

// ------- app ----------------------------------------------------------------
const el = (id) => document.getElementById(id);
const body = el("panelbody");
let DATA = null, pinned = null;

function initArchetypes() {
  const sel = el("archetype");
  sel.innerHTML = ARCHETYPES.map((a) =>
    `<option value="${a.slug}">${esc(a.label)}${STOCKS[a.slug] ? "" : " (no stock list)"}</option>`
  ).join("");
  sel.value = ARCHETYPE;
  sel.addEventListener("change", () => {
    ARCHETYPE = sel.value;
    const a = ARCHETYPES.find((x) => x.slug === ARCHETYPE);
    el("title").textContent = `${a.label} — unusual card scan`;
    document.title = `${a.label} — unusual card scan`;
    renderStockbar();
    load(false);
  });
}

function renderStockbar() {
  const stock = currentStock();
  const bar = el("stockbar");
  if (!stock) {
    bar.innerHTML = "<span>No stock list defined for this archetype — decks are " +
      "listed without comparison. Add one under <code>STOCKS</code> in index.html.</span>";
    return;
  }
  const b = bucketStock(stock.main);
  const md = Object.keys(b).sort()
    .map((n) => `<span class="stk"${dc(n)}>${fmtStock(b[n])} ${esc(n)}</span>`).join("");
  const sbB = bucketStock(stock.side);
  const sb = Object.keys(sbB).sort()
    .map((n) => `<span class="stk"${dc(n)}>${fmtStock(sbB[n])} ${esc(n)}</span>`).join(" ");
  bar.innerHTML =
    `<strong style="color:var(--ink)">Stock&nbsp;MD:</strong> ${md}` +
    `<span>&nbsp;·&nbsp;<strong style="color:var(--ink)">SB:</strong></span> ${sb}`;
}

function render() {
  if (!DATA) return;
  const hideStock = el("hideStock").checked;
  const ignoreCounts = el("ignoreCounts").checked;
  const hasStock = !!currentStock();
  const list = el("decks");
  list.innerHTML = "";
  let shown = 0;
  for (const deck of DATA.decks) {
    const d = hasStock ? diff(deck, ignoreCounts) : null;
    const n = d ? deviationCount(d) : 0;
    if (hideStock && hasStock && n === 0) continue;
    shown++;

    const li = document.createElement("li");
    li.className = "deck";
    let diffHtml;
    if (!d) diffHtml = '<div class="chips"><span class="chip none">no stock list for this archetype</span></div>';
    else if (n === 0) diffHtml = '<div class="chips"><span class="chip none">stock list</span></div>';
    else diffHtml = diffCols(d);
    const badgeHtml = hasStock
      ? `<span class="badge ${n === 0 ? "zero" : ""}">${n}</span>`
      : '<span class="badge zero">–</span>';
    li.innerHTML =
      `<div class="row">
        <span class="place">${esc(deck.place)}</span>
        <span class="player"><a href="${esc(deck.url)}" target="_blank" rel="noopener">${esc(deck.player)}</a></span>
        <span class="tourney">${esc(deck.tourney)}</span>
        <span class="date">${esc(deck.date)}</span>
        ${badgeHtml}
      </div>
      ${diffHtml}`;
    li._html = panelHtml(deck, d ? d.unusual : new Set());
    li.addEventListener("mouseenter", () => { if (!pinned) showPanel(li); });
    li.addEventListener("click", () => { pinned = pinned === li ? null : li; showPanel(li); });
    list.appendChild(li);
  }
  el("meta").textContent = `${shown} of ${DATA.count} decklists`;
}

function showPanel(li) {
  body.innerHTML = li._html;
  document.querySelectorAll("li.deck.active").forEach((e) => e.classList.remove("active"));
  li.classList.add("active");
}

async function load(refresh) {
  el("status").style.display = "block";
  el("status").textContent = refresh ? "refreshing from mtggoldfish…" : "loading decks…";
  el("decks").innerHTML = "";
  el("refresh").disabled = true;
  try {
    const u = `${WORKER}?archetype=${encodeURIComponent(ARCHETYPE)}${refresh ? "&refresh=1" : ""}`;
    const r = await fetch(u);
    if (!r.ok) throw new Error(`worker HTTP ${r.status}`);
    DATA = await r.json();
    el("status").style.display = "none";
    el("freshness").textContent = "data as of " + new Date(DATA.generated).toLocaleString();
    render();
  } catch (err) {
    el("status").textContent = "Failed to load: " + err.message +
      ". The Worker may be cold or rate-limited — try refresh.";
  } finally {
    el("refresh").disabled = false;
  }
}

// ------- Scryfall hover preview ---------------------------------------------
const scry = (mode, name) =>
  `https://api.scryfall.com/cards/named?${mode}=${encodeURIComponent(name)}&format=image&version=normal`;
const pop = document.createElement("div");
pop.id = "cardpop";
pop.innerHTML = '<img alt="">';
document.body.appendChild(pop);
const popImg = pop.firstChild;
let popName = null;

function positionPop(e) {
  const pad = 16, w = pop.offsetWidth || 240, h = pop.offsetHeight || 335;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + w > innerWidth) x = e.clientX - pad - w;
  if (y + h > innerHeight) y = Math.max(6, innerHeight - h - 6);
  pop.style.left = x + "px";
  pop.style.top = y + "px";
}
document.addEventListener("mouseover", (e) => {
  const t = e.target.closest("[data-card]");
  if (!t) return;
  const name = t.getAttribute("data-card");
  if (name !== popName) {
    popName = name;
    popImg.onerror = () => { popImg.onerror = null; popImg.src = scry("fuzzy", name); };
    popImg.src = scry("exact", name);
  }
  pop.style.display = "block";
  positionPop(e);
});
document.addEventListener("mousemove", (e) => {
  if (pop.style.display === "block") positionPop(e);
});
document.addEventListener("mouseout", (e) => {
  const t = e.target.closest("[data-card]");
  if (!t) return;
  const to = e.relatedTarget && e.relatedTarget.closest
    ? e.relatedTarget.closest("[data-card]") : null;
  if (to === t) return;
  pop.style.display = "none";
  popName = null;
});

initArchetypes();
renderStockbar();
el("hideStock").addEventListener("change", render);
el("ignoreCounts").addEventListener("change", render);
el("refresh").addEventListener("click", () => load(true));
load(false);
</script>
</body></html>
